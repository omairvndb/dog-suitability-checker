services:

  artemis:
    image: apache/activemq-artemis:latest
    container_name: artemis
    ports:
      - "8161:8161"   # Admin UI
      - "5672:5672"   # AMQP
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis

  postgres:
    image: postgres:latest
    container_name: dogchecker-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dogchecker
      POSTGRES_PASSWORD: dogchecker
      POSTGRES_DB: dogchecker
    volumes:
      - postgres_data:/var/lib/postgresql

  dog-checker-api:
    build: ./dog-checker-api
    container_name: dog-checker-api
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/dogchecker
      AMQP_HOST: artemis
    depends_on:
      - artemis
      - postgres

  dog-checker-worker:
    build: ./dog-checker-worker
    container_name: dog-checker-worker
    ports:
      - "8081:8081"
    env_file: ./dog-checker-worker/.env
    environment:
      AMQP_HOST: artemis
    depends_on:
      - artemis

volumes:
  postgres_data:
